filebeat.inputs:
  - type: filestream
    id: portfolio-container-logs
    paths:
      - /var/log/containers/*.log
    parsers:
      - container: ~

processors:
  - add_kubernetes_metadata:
      host: ${NODE_NAME}
      matchers:
        - logs_path:
            logs_path: /var/log/containers/
  - drop_event:
      when:
        not:
          contains:
            kubernetes.namespace: "portfolio"

output.logstash:
  hosts: ["logstash.monitoring.svc.cluster.local:5044"]
