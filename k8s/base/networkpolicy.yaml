apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portfolio-web-ingress
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: portfolio-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: TCP
          port: 3306
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
