name: Portfolio CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  KUBE_NAMESPACE: portfolio-prod
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-test-push:
    name: Build, test, and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA::7}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Run container smoke test
        run: |
          docker run -d --name portfolio-smoke -p 8080:8080 "$IMAGE"
          sleep 5
          ./scripts/smoke-test.sh http://127.0.0.1:8080
          docker rm -f portfolio-smoke

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push "$IMAGE"

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-test-push
    if: github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/overlays/prod

      - name: Create or update MySQL secret
        run: |
          kubectl -n "$KUBE_NAMESPACE" create secret generic portfolio-mysql-prod \
            --from-literal=host="${{ secrets.MYSQL_HOST }}" \
            --from-literal=database="${{ secrets.MYSQL_DATABASE }}" \
            --from-literal=username="${{ secrets.MYSQL_USERNAME }}" \
            --from-literal=password="${{ secrets.MYSQL_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy image
        run: |
          kubectl -n "$KUBE_NAMESPACE" set image deployment/portfolio-web-prod web="${{ needs.build-test-push.outputs.image }}"
          kubectl -n "$KUBE_NAMESPACE" rollout status deployment/portfolio-web-prod --timeout=180s
